name: CI Build / Test (Pull Request)

on:
  - pull_request

jobs:

  build-linux:
    name: Build / Test on Linux
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ^1.25
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Build for AMD64
      run: GOOS=linux GOARCH=amd64 go build -tags jsoniter -v ./...

    - name: Test
      run: go test -tags jsoniter -v ./...

  build-linux-prod:
    name: Build / Test on Linux (Production Mode)
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ^1.25
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Build for AMD64 (Production Mode)
      run: GOOS=linux GOARCH=amd64 go build -tags jsoniter,slimcap_nomock -v ./...

    - name: Test (Production Mode)
      run: |
        go test -tags jsoniter,slimcap_nomock -v ./...

  build-linux-nocgo:
    name: Build / Test on Linux (No-CGO Mode)
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ^1.25
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Build for AMD64 (No-GCO Mode)
      run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -tags jsoniter -v ./...

    - name: Test (No-CGO Mode)
      run: |
        CGO_ENABLED=0 go test -tags jsoniter -v ./...

  build-linux-race-detector:
    name: Build / Test on Linux (Race Detector)
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ^1.25
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Build for AMD64
      run: GOOS=linux GOARCH=amd64 go build -tags jsoniter -v ./...

    - name: Test (Race Detector enabled)
      run: |
        go test -tags jsoniter -race -v ./...

  lint-chart:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # ct needs history to diff the chart against the target branch

    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: helm lint
      run: helm lint charts/goquery-ui

    - name: helm template
      # backend.url is a required value with no default, so supply a representative
      # one to exercise full template rendering.
      run: helm template charts/goquery-ui --set backend.url=http://global-query.observability.svc.cluster.local:8145

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Set up chart-testing
      uses: helm/chart-testing-action@v2

    - name: ct lint
      # Detect changed charts by diffing against the target branch (no --charts), so
      # --check-version-increment is actually enforced. Maintainer is a team label with
      # a URL rather than a GitHub handle, so skip maintainer-as-user validation.
      run: |
        ct lint \
          --target-branch ${{ github.event.repository.default_branch }} \
          --check-version-increment \
          --validate-maintainers=false
