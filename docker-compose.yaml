services:
  sensor:
    image: goprobe/sensor:${VERSION:-latest}
    build:
      target: sensor
      context: .
    restart: unless-stopped
    container_name: sensor
    network_mode: host
    environment:
      - DB_PATH=/var/lib/goprobe/db
      - LOCAL__BUFFERS_SIZE__LIMIT=33554432
      - LOCAL__BUFFERS_NUM__BUFFERS=1
      - AUTODETECTION_ENABLED=1
      - AUTODETECTION_EXCLUDE=/br-.*/,docker0
      - API_ADDR=127.0.0.1:3005
      - API_METRICS=1
      - API_PROFILING=0
      - API_KEYS=48fd01fa8f8b12a31fdc614c27c6c273459fe7755a141e9e8deed9f65123f97d
    volumes:
      - db:/var/lib/goprobe/db

  query:
    image: goprobe/query:${VERSION:-latest}
    build:
      target: query
      context: .
    restart: unless-stopped
    container_name: query
    network_mode: host
    environment:
      - SERVER_ADDR=127.0.0.1:8146
      - HOSTS_RESOLVER_TYPE=string
      - QUERIER_TYPE=api
      - QUERIER_MAX_CONCURRENT=32
      - QUERIER_CONFIG=/app/goprobe-global-querier.yaml
    volumes:
      - ./examples/docker/querier.example.yaml:/app/goprobe-global-querier.yaml:ro

  # ---- Frontend ----
  #
  # The image is self-contained: env.js is generated at container startup
  # from environment variables — no sidecar or init container needed.
  #
  # Environment variables:
  #   GQ_LISTEN_ADDR       - Caddy bind address. network_mode: host means the
  #                          container shares the host's interfaces, so this
  #                          defaults to 127.0.0.1:5137 (loopback only). To reach
  #                          the UI from other hosts, set it to :5137 (all
  #                          interfaces) and put it behind a reverse proxy /
  #                          firewall, or bind a specific trusted interface.
  #   GQ_BACKEND_HOST      - address of the global-query API that Caddy forwards
  #                          the UI's /_query and /-/ requests to. This is Caddy's
  #                          own in-container forwarding, not any external reverse
  #                          proxy (e.g. nginx) you may run in front of the UI.
  #                          Match it to the query service's SERVER_ADDR above.
  #   GQ_API_BASE_URL      - URL the *browser* uses to reach the API.
  #                          Leave empty (default) to route via the Caddy proxy.
  #   HOST_RESOLVER_TYPES  - comma-separated resolver types shown in the UI (default: string)
  #   SSE_ON_LOAD          - enable SSE streaming by default (default: true)

  frontend:
    build:
      context: ./frontend/goquery-ui
      dockerfile: Dockerfile
    image: goprobe/frontend:${VERSION:-latest}
    restart: unless-stopped
    container_name: frontend
    network_mode: host
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=1m,uid=1000,gid=1000
      - /var/run/env:noexec,nosuid,size=1m,uid=1000,gid=1000
    volumes:
      - frontend_data:/data
      - frontend_config:/config
    environment:
      GQ_LISTEN_ADDR: ${GQ_LISTEN_ADDR:-127.0.0.1:5137}
      GQ_BACKEND_HOST: ${GQ_BACKEND_HOST:-http://127.0.0.1:8146}
      GQ_API_BASE_URL: ${GQ_API_BASE_URL:-}
      HOST_RESOLVER_TYPES: ${HOST_RESOLVER_TYPES:-string}
      SSE_ON_LOAD: ${SSE_ON_LOAD:-true}

volumes:
  db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/tmp/goprobe_db' # NOTE: Directory must exist and have read/write permissions for UID:GID 1000:1000
  frontend_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/tmp/goprobe_frontend_data' # NOTE: Directory must exist and have read/write permissions for UID:GID 1000:1000
  frontend_config:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/tmp/goprobe_frontend_config' # NOTE: Directory must exist and have read/write permissions for UID:GID 1000:1000
