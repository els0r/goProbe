services:
  sensor:
    image: goprobe/sensor:${VERSION:-latest}
    build:
      target: sensor
      context: .
    restart: unless-stopped
    container_name: sensor
    network_mode: host
    environment:
      - DB_PATH=/usr/local/goProbe/db
      - LOCAL__BUFFERS_SIZE__LIMIT=33554432
      - LOCAL__BUFFERS_NUM__BUFFERS=1
      - AUTODETECTION_ENABLED=1
      - AUTODETECTION_EXCLUDE=/br-.*/,docker0
      - API_ADDR=127.0.0.1:3005
      - API_METRICS=1
      - API_PROFILING=0
      - API_KEYS=48fd01fa8f8b12a31fdc614c27c6c273459fe7755a141e9e8deed9f65123f97d
    volumes:
      - db:/usr/local/goProbe/db

  query:
    image: goprobe/query:${VERSION:-latest}
    build:
      target: query
      context: .
    restart: unless-stopped
    container_name: query
    network_mode: host
    environment:
      - SERVER_ADDR=127.0.0.1:8146
      - HOSTS_RESOLVER_TYPE=string
      - QUERIER_TYPE=api
      - QUERIER_MAX_CONCURRENT=32
      - QUERIER_CONFIG=/app/goprobe-global-querier.yaml
    volumes:
      - ./examples/docker/querier.example.yaml:/app/goprobe-global-querier.yaml:ro

  # ---- Frontend (opt-in, profile: frontend) ----
  #
  # Bring up the SPA frontend alongside the backend stack:
  #   docker compose --profile frontend up
  #
  # Required environment variables:
  #   GQ_BACKEND_HOST  - address of the global-query API as seen from inside the
  #                      container network, e.g. http://127.0.0.1:8145
  #                      Defaults to the loopback address of the query service.
  #
  # Optional environment variables:
  #   GQ_API_BASE_URL  - URL the *browser* uses to reach the API.
  #                      Leave empty (default) to route via the Caddy proxy so
  #                      the browser sees same-origin requests and no CORS is needed.
  #                      Set to a full URL only for direct-access / split deployments.
  #   HOST_RESOLVER_TYPES - comma-separated resolver types shown in the UI (default: string)
  #   SSE_ON_LOAD          - enable SSE streaming by default (default: true)

  frontend-env-writer:
    profiles: ['frontend']
    image: alpine:3.19
    command: sh -c "apk add --no-cache gettext && sh /scripts/write-env.sh"
    environment:
      GQ_API_BASE_URL: ${GQ_API_BASE_URL:-}
      HOST_RESOLVER_TYPES: ${HOST_RESOLVER_TYPES:-string}
      SSE_ON_LOAD: ${SSE_ON_LOAD:-true}
    volumes:
      - frontend_env_run:/var/run/env
      - ./frontend/goquery-ui/scripts:/scripts:ro

  frontend-web:
    profiles: ['frontend']
    build:
      context: ./frontend/goquery-ui
      dockerfile: Dockerfile
    image: goquery-ui:latest
    depends_on:
      frontend-env-writer:
        condition: service_completed_successfully
    ports:
      - '5137:5137'
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      - frontend_env_run:/var/run/env
      - frontend_caddy_data:/data
      - frontend_caddy_config:/config
    environment:
      NODE_ENV: production
      GQ_BACKEND_HOST: ${GQ_BACKEND_HOST:-http://127.0.0.1:8145}

volumes:
  db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/tmp/goprobe_db' # NOTE: Directory must exist and have read/write permissions for UID:GID 1000:1000
  frontend_env_run: {}
  frontend_caddy_data: {}
  frontend_caddy_config: {}
